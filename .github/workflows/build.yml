name: Проверка компиляции

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Компиляция изменённых файлов
      run: |
        git fetch origin main
        
        $files = git diff --name-only origin/main...HEAD | Where-Object { $_ -match '\.cpp$' }
        
        if ($files.Count -eq 0) {
          Write-Host "Нет изменённых .cpp файлов"
          exit 0
        }
        
        foreach ($file in $files) {
          # Извлекаем имя студента
          $student = "unknown"
          if ($file -match 'students/([^/]+)/') {
            $student = $matches[1]
          }
          
          Write-Host ""
          Write-Host "===================================="
          Write-Host "Студент: $student"
          Write-Host "Файл: $file"
          Write-Host "===================================="
          
          $outputName = "temp_" + $student + ".exe"
          & "cl" /EHsc /nologo /Fe:$outputName $file
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ОШИБКА у $student в файле $file"
            exit 1
          }
          
          Write-Host "OK: $student"
        }
        
        Write-Host ""
        Write-Host "Все файлы скомпилированы"
      shell: cmd